name: Generate Standalone Android APK

# Builds a native Android APK directly on this runner via `expo prebuild` +
# Gradle — no EAS build queue or EAS credits needed. Fires on pushes to
# main, or run it manually from the Actions tab. Download the APK from the
# run's "Artifacts" section when it finishes.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install Android Build-Tools 36.0.0
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci

      - name: Generate Native Android Folder
        run: npx expo prebuild --platform android --no-install
        env:
          CI: "1"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      # Debug build: signed with the auto-generated debug keystore, so it
      # installs straight on an emulator/device with no signing secrets to
      # configure. (assembleRelease would need a release keystore set up
      # via gradle.properties/secrets to produce an installable APK.)
      - name: Compile Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Avolens-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
