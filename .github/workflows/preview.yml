name: Expo Cloud Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  update:
    name: Expo EAS Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Trigger Expo Cloud Update
        run: npx eas-cli update --auto --non-interactive
